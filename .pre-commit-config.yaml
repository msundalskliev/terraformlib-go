repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: local
    hooks:
      - id: go-fmt
        name: go format
        entry: sh -c 'if [ "$(gofmt -l -s . | wc -l)" -gt 0 ]; then echo "go files need formatting"; gofmt -l -s .; exit 1; fi'
        language: system
        files: \.go$
      - id: go-build
        name: go build
        entry: go build ./cmd/terraformlib
        language: system
        files: \.go$
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        files: \.go$
        pass_filenames: false
